name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Validate before publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Make test scripts executable
        run: chmod +x tests/*.sh

      - name: Run all tests
        run: bash tests/run_all.sh

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION="v$(node -e "console.log(require('./package.json').version)")"
          echo "Tag: $TAG  |  package.json: $PKG_VERSION"
          [ "$TAG" = "$PKG_VERSION" ] || (echo "Tag $TAG does not match package.json version $PKG_VERSION" && exit 1)

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update learnship-marketplace version
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          CURRENT=$(curl -s -H "Authorization: token $GH_PAT" \
            "https://api.github.com/repos/FavioVazquez/learnship-marketplace/contents/.claude-plugin/marketplace.json" \
            | python3 -c "import sys,json,base64; r=json.load(sys.stdin); print(json.loads(base64.b64decode(r['content']))['plugins'][0]['version'])")
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "Marketplace already at $VERSION — skipping"
            exit 0
          fi
          curl -s -H "Authorization: token $GH_PAT" \
            "https://api.github.com/repos/FavioVazquez/learnship-marketplace/contents/.claude-plugin/marketplace.json" \
            | python3 -c "
          import sys,json,base64,urllib.request,os
          pat=os.environ['GH_PAT']
          r=json.load(sys.stdin)
          content=json.loads(base64.b64decode(r['content']))
          content['plugins'][0]['version']='$VERSION'
          new_b64=base64.b64encode(json.dumps(content,indent=2).encode()+b'\n').decode()
          payload=json.dumps({'message':'chore: bump version to $VERSION','sha':r['sha'],'content':new_b64}).encode()
          req=urllib.request.Request(
            'https://api.github.com/repos/FavioVazquez/learnship-marketplace/contents/.claude-plugin/marketplace.json',
            data=payload, method='PUT',
            headers={'Authorization':'token '+pat,'Content-Type':'application/json'})
          resp=json.loads(urllib.request.urlopen(req).read())
          print('Marketplace updated to $VERSION:', resp['commit']['sha'][:12])
          "
