name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Validate before publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Make test scripts executable
        run: chmod +x tests/*.sh

      - name: Run all tests
        run: bash tests/run_all.sh

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION="v$(node -e "console.log(require('./package.json').version)")"
          echo "Tag: $TAG  |  package.json: $PKG_VERSION"
          [ "$TAG" = "$PKG_VERSION" ] || (echo "Tag $TAG does not match package.json version $PKG_VERSION" && exit 1)

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
